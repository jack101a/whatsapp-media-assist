services:
  api:
    build:
      context: ../server
    restart: unless-stopped
    env_file: ../server/.env
    secrets:
      - source: entitlement_private_key
        target: entitlement_private_key.pem
        mode: 0444
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - mediaassist_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/healthz')"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [mediaassist]
    logging:
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  entitlement_private_key:
    file: ../owner-secrets/entitlement-private.pem

volumes:
  mediaassist_data:

networks:
  mediaassist:
